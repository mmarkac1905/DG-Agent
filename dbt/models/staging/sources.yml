version: 2

sources:
  - name: raw_sap
    schema: raw_sap
    description: "Raw SAP MM tables for Helios Telecom CPE procurement. Loaded by scripts/generate_sap_sample_data.py."
    tables:
      - name: t001
        description: "Company codes"
      - name: t001w
        description: "Plants / warehouses"
      - name: t001l
        description: "Storage locations"
      - name: t024
        description: "Purchasing groups"
      - name: t024e
        description: "Purchasing organizations"
      - name: t023
        description: "Material groups"
      - name: t156
        description: "Movement type configuration (BWART, BWARK movement category, KZBEW movement indicator, SHKZG debit/credit). One row per movement type."
      - name: t156t
        description: "Movement type text — multi-language descriptions keyed on (BWART, SPRAS). One row per movement type × language."
      - name: lfa1
        description: "Vendor general data"
      - name: lfb1
        description: "Vendor company code data"
      - name: lfm1
        description: "Vendor purchasing organization data"
      - name: mara
        description: "Material general data"
      - name: makt
        description: "Material descriptions"
      - name: marc
        description: "Material plant-level data"
      - name: marm
        description: "Material units of measure"
      - name: eban
        description: "Purchase requisition items"
      - name: ebkn
        description: "Purchase requisition account assignments"
      - name: ekko
        description: "Purchasing document header"
      - name: ekpo
        description: "Purchasing document item"
      - name: eket
        description: "Purchasing document delivery schedule"
      - name: ekkn
        description: "Purchasing document account assignment"
      - name: mkpf
        description: "Material document header"
      - name: mseg
        description: "Material document item"
      - name: ekbe
        description: "Purchasing document history"
      - name: rbkp
        description: "Invoice document header"
      - name: rseg
        description: "Invoice document item"
      - name: equi
        description: "Equipment master records (individual CPE devices)"
      - name: eqbs
        description: "Equipment time segment (status history)"
      - name: seri
        description: "Serial number assignments at goods movement"
      - name: ser01
        description: "Serial number document header — PO reference"
      - name: ser03
        description: "Serial number document header — material document reference"
      - name: objk
        description: "Object list — serial to equipment cross-reference"
      - name: mard
        description: "Stock per storage location"
      - name: bkpf
        description: "Accounting document header"
      - name: bseg
        description: "Accounting document line item"
      - name: rkpf
        description: "Reservation header"
      - name: resb
        description: "Reservation item"
      - name: kna1
        description: "Customer general data (SD). One row per customer; KTOKD distinguishes residential (0001) vs business (0002). Generated by scripts/generate_sd_billing.py."
      - name: vbak
        description: "Sales document header (SD) — the service contract. One row per sales order; KUNNR is the sold-to customer. Generated by scripts/generate_sd_billing.py."
      - name: vbap
        description: "Sales document item (SD). MATNR is the service plan; SERNR carries the deployed CPE device serial (ties revenue to the physical router). Generated by scripts/generate_sd_billing.py."
      - name: vbrk
        description: "Billing document header (SD). One row per monthly service invoice; FKDAT is the billing date, FKSTO='X' marks cancelled. Generated by scripts/generate_sd_billing.py."
      - name: vbrp
        description: "Billing document item (SD). NETWR is the service revenue; MATNR is the service plan; AUBEL references the originating sales order. Generated by scripts/generate_sd_billing.py."
      - name: zmm_approval_log
        description: "Custom Z-table — invoice-variance approval event log (HT-specific custom ABAP, ZMM_APPROVAL_LOG). Tracks tolerance approvals when 3-way match exceeds 5% threshold."
      - name: zmm_vendor_business
        description: "Custom Z-table — HT-domain vendor business enrichment keyed on LIFNR (equipment_types, contract_status, quality_rating, notes). Genuinely-HT fields only; lead_time lives in MARC.PLIFZ and payment terms in LFB1.ZTERM. Production equivalent: a Z-table populated by HT's vendor-management workflow."
      - name: zmm_material_business
        description: "Custom Z-table — HT-domain material business enrichment keyed on MATNR (lifecycle_months, primary_vendor_id, notes). Genuinely-HT fields only; unit cost lives in MBEW.STPRS / sat_po_item.unit_price. Production equivalent: a Z-table populated by HT's material-management workflow."
