name: Olist second source

# Separate workflow from CI: this one depends on a third-party mirror for
# the dataset download, so a mirror outage must not turn the main badge red.
# It exists so the opt-in Olist models cannot rot silently: it rebuilds them
# against freshly downloaded data and asserts the README's numbers.

on:
  push:
    branches: [main]
    paths:
      - "dbt/models/olist/**"
      - "scripts/load_olist_source.py"
      - "scripts/generate_olist_data_dictionary.py"
      - ".github/workflows/olist.yml"
  schedule:
    - cron: "17 6 * * 1" # weekly rot check, Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  build-olist:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download + load the Olist dataset
        run: python scripts/load_olist_source.py

      - name: Build the Olist model chain
        env:
          DG_ENABLE_OLIST: "true"
        run: |
          cd dbt
          dbt deps
          dbt build --select +models/olist

      - name: Reconcile marts against the published numbers
        run: |
          python - <<'EOF'
          import duckdb
          con = duckdb.connect("cpe_analytics.duckdb", read_only=True)
          gmv_rows, gmv_total, gmv_cats = con.execute(
              "SELECT COUNT(*), ROUND(SUM(gmv_brl),2), COUNT(DISTINCT product_category_english) "
              "FROM main_marts.fact_gmv_by_category_monthly").fetchone()
          rr = con.execute(
              "SELECT ROUND(100.0*SUM(repeat_orders)/SUM(total_orders),3) "
              "FROM main_marts.fact_repeat_customer_rate").fetchone()[0]
          con.close()
          print(f"GMV: {gmv_rows} rows, {gmv_total} BRL, {gmv_cats} categories | repeat rate: {rr}%")
          assert (gmv_rows, float(gmv_total), gmv_cats) == (1282, 13496408.43, 74), "GMV mart drifted"
          assert float(rr) == 3.044, "repeat-rate mart drifted"
          con = duckdb.connect("cpe_analytics.duckdb", read_only=True)
          otd = con.execute(
              "SELECT ROUND(100.0*SUM(on_time_orders)/SUM(delivered_orders),3) "
              "FROM main_marts.fact_on_time_delivery_monthly").fetchone()[0]
          xs_d, xs_c = con.execute(
              "SELECT SUM(delivered_orders), SUM(cross_state_orders) "
              "FROM main_marts.fact_cross_state_order_share").fetchone()
          con.close()
          print(f"on-time: {otd}% | cross-state: {xs_c}/{xs_d}")
          assert float(otd) == 91.888, "on-time mart drifted"
          assert (int(xs_d), int(xs_c)) == (96478, 61898), "cross-state mart drifted"
          print("RECONCILES — published numbers hold on freshly downloaded data")
          EOF
